<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Admin PUBG Mobile - Battleground Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@400;700&display=swap');
        
        body { 
            font-family: 'Roboto Condensed', sans-serif; 
            background: #1a1a1a;
            color: #e5e7eb;
            min-height: 100vh;
        }

        h1, h2, h3, button, .font-oswald {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        .glass-panel {
            background: rgba(31, 41, 55, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(234, 179, 8, 0.2);
        }

        .pubg-gradient {
            background: linear-gradient(135deg, #facc15, #eab308);
            color: #000;
        }

        .pubg-border {
            border: 2px solid #eab308;
        }

        body.locked #mainContent {
            filter: blur(30px);
            pointer-events: none;
        }

        .security-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            background-image: radial-gradient(circle, #222 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .image-queue-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #4b5563;
        }

        .remove-img-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #ef4444;
            color: white;
            border-radius: 4px;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
        }

        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 3px solid #000;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
    </style>
</head>
<body oncontextmenu="return false" class="select-none locked">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="security-overlay">
        <div class="glass-panel p-10 rounded-lg shadow-2xl max-w-md w-full border-2 border-yellow-500 text-center">
            <div class="text-6xl mb-6">🏆</div>
            <h2 class="text-3xl font-bold mb-2 text-yellow-500 tracking-wider">PUBG ADMIN ACCESS</h2>
            <p class="text-gray-400 mb-8 font-medium">Verify credentials to access Global Database.</p>
            
            <input type="password" id="officePassword" placeholder="ACCESS CODE" class="w-full bg-gray-800 border-2 border-gray-700 rounded-lg p-4 mb-4 text-center font-bold outline-none focus:border-yellow-500 text-white transition-all">
            
            <button onclick="checkLogin()" class="w-full py-4 pubg-gradient font-bold rounded-lg hover:brightness-110 shadow-lg shadow-yellow-900/20 transition-all tracking-widest">DEPLOY SYSTEM</button>
            <div id="loginError" class="mt-4 text-red-500 font-bold text-sm hidden"></div>
        </div>
    </div>

    <div id="mainContent" class="p-4 md:p-8 transition-all duration-500 opacity-0">
        <header class="max-w-7xl mx-auto mb-10">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 glass-panel rounded-xl p-8 flex flex-col justify-center border-l-8 border-yellow-500">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-3 h-3 bg-yellow-500 rounded-full animate-ping"></div>
                        <span class="text-xs font-bold uppercase tracking-widest text-yellow-500">PUBG Mobile Secure</span>
                    </div>
                    <h1 class="text-4xl font-bold text-white tracking-tight leading-none">
                        BATTLEGROUND<br><span class="text-yellow-500">ADMIN PRO</span>
                    </h1>
                </div>

                <div class="lg:col-span-8 glass-panel rounded-xl p-8 flex flex-col md:flex-row items-center justify-between gap-8 pubg-border">
                    <div class="text-center md:text-left">
                        <div id="realTimeClock" class="font-mono text-6xl font-bold text-yellow-500 leading-none">00:00:00</div>
                        <div id="currentDate" class="text-sm font-bold text-gray-400 mt-2 uppercase tracking-widest">---</div>
                    </div>
                    <div class="flex flex-col items-center md:items-end">
                        <div id="statusBadge" class="px-4 py-2 rounded-md text-xs font-bold uppercase tracking-wider mb-2 bg-yellow-500 text-black">● ENCRYPTED CONNECTION</div>
                        <div class="text-xs font-bold text-gray-400 uppercase">Storage: <span id="storageInfo" class="text-yellow-500">0 KB</span></div>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Input Akun -->
            <div class="lg:col-span-5">
                <div class="glass-panel p-8 rounded-xl shadow-xl overflow-y-auto max-h-[85vh] border border-gray-700">
                    <h2 class="text-xl font-bold text-yellow-500 mb-8 flex items-center gap-3">
                        <span class="p-2 bg-gray-700 rounded-lg">🎖️</span>
                        ENTRY DATA BATTLEGROUND
                    </h2>
                    
                    <form id="pubgAccountForm" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Type Transaction</label>
                                <select id="tipe" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 font-bold text-white outline-none focus:border-yellow-500">
                                    <option value="Jual">🛒 SELL ACCOUNT</option>
                                    <option value="Lepas">💸 RELEASE ACCOUNT</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Rank Season</label>
                                <select id="rank" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 font-bold text-white outline-none focus:border-yellow-500">
                                    <option value="Conqueror">⭐ CONQUEROR</option>
                                    <option value="Ace">🎖️ ACE / ACE MASTER</option>
                                    <option value="Crown">🦅 CROWN</option>
                                    <option value="Diamond">💎 DIAMOND</option>
                                    <option value="Gold/Below">🥉 GOLD/BELOW</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Login Method</label>
                                <select id="metodeLogin" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 font-bold text-white outline-none focus:border-yellow-500">
                                    <option value="Twitter">Twitter / X</option>
                                    <option value="Facebook">Facebook</option>
                                    <option value="Google Play">Google Play</option>
                                    <option value="E-mail">Linked E-mail</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Email Status</label>
                                <select id="statusEmail" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 font-bold text-white outline-none focus:border-yellow-500">
                                    <option value="Polos & A2F Off">⚪ Fresh & A2F Off</option>
                                    <option value="Berisi & A2F On">📧 Active & A2F On</option>
                                    <option value="No-Elink">🛡️ No E-link / Deadlink</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">PUBG Nick/ID</label>
                                <input type="text" id="pubgId" required placeholder="NICKNAME / UID" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 font-semibold outline-none focus:border-yellow-500 text-white">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                                <input type="text" id="password" required placeholder="LOGIN PASS" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 font-semibold outline-none focus:border-yellow-500 text-white">
                            </div>
                        </div>

                        <!-- Inventori Khas PUBG -->
                        <div class="p-6 bg-gray-800/50 rounded-xl border border-yellow-500/20 space-y-4">
                            <h3 class="text-xs font-bold text-yellow-500 uppercase tracking-widest flex items-center gap-2">
                                <span>🎒</span> EXCLUSIVE INVENTORY
                            </h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Lab Weapon (Upgradable)</label>
                                    <input type="text" id="labGun" placeholder="M4 Glacier, AWM..." class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 font-semibold outline-none focus:border-yellow-500 text-white">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Outfit Sets</label>
                                    <input type="text" id="bundle" placeholder="X-Suit, Mummy..." class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 font-semibold outline-none focus:border-yellow-500 text-white">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Vehicles & Extras</label>
                                <textarea id="detailVault" placeholder="Tesla, McLaren, Lambo, Companions..." class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 font-semibold outline-none focus:border-yellow-500 text-white h-20 resize-none"></textarea>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Attachment Evidence (Screenshots)</label>
                            <label class="flex flex-col items-center w-full p-4 bg-gray-800 text-yellow-500 rounded-lg border-2 border-dashed border-gray-600 cursor-pointer hover:bg-gray-700 transition">
                                <span class="text-sm font-bold" id="uploadLabel">UPLOAD SCREENSHOTS</span>
                                <input type='file' id="fotoInput" accept="image/*" class="hidden" multiple onchange="handleFileSelection(event)" />
                            </label>
                            <div id="imageQueue" class="flex flex-wrap gap-2 mt-4"></div>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full pubg-gradient font-bold py-5 rounded-lg shadow-lg hover:brightness-110 transition-all uppercase tracking-widest text-sm flex justify-center items-center">
                            <span>UPLOAD TO GLOBAL DATABASE</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- List Data Akun -->
            <div class="lg:col-span-7">
                <div class="glass-panel p-8 rounded-xl shadow-xl min-h-[600px] border border-gray-700">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-2xl font-bold text-white tracking-tight">SOLDIER RECORDS</h2>
                        <div class="flex gap-4">
                             <button onclick="exportAllData()" class="text-xs font-bold text-yellow-500 uppercase tracking-widest hover:underline transition">Backup JSON</button>
                             <button onclick="hapusSemua()" class="text-xs font-bold text-red-500 uppercase tracking-widest hover:text-red-600 transition">Wipe Data</button>
                        </div>
                    </div>
                    
                    <div id="listData" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let dbData = JSON.parse(localStorage.getItem('pubg_admin_secure_data_v1')) || [];
        const OFFICE_PASS = "kantoradmin"; 
        
        let currentPhotoQueue = [];

        function checkLogin() {
            const input = document.getElementById('officePassword');
            if (input.value === OFFICE_PASS) {
                document.body.classList.remove('locked');
                document.getElementById('loginOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('mainContent').style.opacity = '1';
                }, 500);
            } else {
                const err = document.getElementById('loginError');
                err.innerText = "ACCESS DENIED: WRONG CODE!";
                err.classList.remove('hidden');
            }
        }

        async function compressImage(file) {
            const options = {
                maxSizeMB: 0.2,
                maxWidthOrHeight: 1280,
                useWebWorker: true
            };
            try {
                return await imageCompression(file, options);
            } catch (error) {
                console.error(error);
                return file;
            }
        }

        async function handleFileSelection(event) {
            const files = event.target.files;
            const uploadLabel = document.getElementById('uploadLabel');
            uploadLabel.innerText = "PROCESSING...";
            
            for (let i = 0; i < files.length; i++) {
                const compressedFile = await compressImage(files[i]);
                const base64 = await toBase64(compressedFile);
                currentPhotoQueue.push(base64);
            }
            
            renderImageQueue();
            uploadLabel.innerText = "UPLOAD SCREENSHOTS";
            event.target.value = '';
        }

        function removePhotoFromQueue(index) {
            currentPhotoQueue.splice(index, 1);
            renderImageQueue();
        }

        function renderImageQueue() {
            const container = document.getElementById('imageQueue');
            container.innerHTML = currentPhotoQueue.map((img, index) => `
                <div class="image-queue-item">
                    <img src="${img}" alt="Preview" class="w-full h-full object-cover">
                    <div class="remove-img-btn" onclick="removePhotoFromQueue(${index})">×</div>
                </div>
            `).join('');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('realTimeClock').innerText = now.toTimeString().split(' ')[0];
            document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            const size = new Blob([JSON.stringify(dbData)]).size;
            document.getElementById('storageInfo').innerText = (size / 1024).toFixed(2) + " KB";
        }

        document.getElementById('pubgAccountForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span> UPLOADING...`;

            try {
                const item = {
                    id: Date.now(),
                    waktu: new Date().toLocaleString('id-ID'),
                    tipe: document.getElementById('tipe').value,
                    rank: document.getElementById('rank').value,
                    metodeLogin: document.getElementById('metodeLogin').value,
                    statusEmail: document.getElementById('statusEmail').value,
                    pubgId: document.getElementById('pubgId').value,
                    password: document.getElementById('password').value,
                    labGun: document.getElementById('labGun').value || "None",
                    bundle: document.getElementById('bundle').value || "Standard",
                    detailVault: document.getElementById('detailVault').value || "-",
                    fotos: [...currentPhotoQueue]
                };

                dbData.unshift(item);
                localStorage.setItem('pubg_admin_secure_data_v1', JSON.stringify(dbData));
                
                renderList();
                e.target.reset();
                currentPhotoQueue = [];
                renderImageQueue();
            } catch (err) {
                alert("DATABASE FULL: PLEASE WIPE OLD RECORDS!");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        const toBase64 = file => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });

        function renderList() {
            const list = document.getElementById('listData');
            if (dbData.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-gray-600 font-bold uppercase tracking-widest text-sm">NO SOLDIER RECORDS FOUND</div>`;
                return;
            }

            list.innerHTML = dbData.map(item => `
                <div class="bg-gray-800/50 p-6 rounded-lg border border-gray-700 flex flex-col md:flex-row justify-between items-center gap-4 hover:shadow-lg transition-all border-l-4 ${item.tipe === 'Jual' ? 'border-l-yellow-500' : 'border-l-blue-500'}">
                    <div class="flex items-start gap-4 w-full md:w-auto">
                        <div class="w-14 h-14 rounded-lg flex items-center justify-center text-2xl bg-gray-900 border border-gray-700">
                            ${item.tipe === 'Jual' ? '🔫' : '💼'}
                        </div>
                        <div class="overflow-hidden">
                            <div class="flex flex-wrap items-center gap-2 mb-1">
                                <h3 class="font-bold text-white tracking-tight truncate max-w-[150px] uppercase">${item.pubgId}</h3>
                                <span class="text-[8px] font-bold uppercase px-2 py-0.5 rounded bg-yellow-500 text-black">${item.rank}</span>
                                <span class="text-[8px] font-bold bg-gray-700 text-gray-300 px-2 py-0.5 rounded">${item.metodeLogin}</span>
                            </div>
                            <p class="text-[10px] font-bold text-gray-400 mb-1">LAB: ${item.labGun} • OUTFIT: ${item.bundle} • [${item.fotos.length} PIX]</p>
                            <p class="text-[9px] font-bold text-yellow-500/50 italic">${item.waktu}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 w-full md:w-auto">
                        <button onclick="downloadPDF(${item.id})" class="flex-1 md:flex-none px-6 py-3 pubg-gradient text-black rounded font-bold text-[10px] uppercase tracking-widest hover:brightness-110 transition">INTEL REPORT</button>
                        <button onclick="hapusData(${item.id})" class="p-3 text-gray-600 hover:text-red-500 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function downloadPDF(id) {
            const data = dbData.find(d => d.id === id);
            if (!data) return;
            const doc = new jsPDF();
            
            // Header Theme PUBG
            doc.setFillColor(26, 26, 26);
            doc.rect(0, 0, 210, 45, 'F');
            doc.setFillColor(234, 179, 8);
            doc.rect(0, 42, 210, 3, 'F');

            doc.setTextColor(234, 179, 8);
            doc.setFontSize(24);
            doc.setFont("helvetica", "bold");
            doc.text("PUBG MOBILE INTEL REPORT", 20, 25);
            doc.setFontSize(10);
            doc.setTextColor(150, 150, 150);
            doc.text(`Record ID: ${data.id} | Timestamp: ${data.waktu}`, 20, 35);
            
            // Data Section
            doc.setTextColor(40, 40, 40);
            doc.setFontSize(14);
            doc.text("1. ACCOUNT AUTHENTICATION", 20, 60);
            doc.setDrawColor(234, 179, 8);
            doc.line(20, 62, 190, 62);
            
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.text(`Character Nick/ID: ${data.pubgId}`, 20, 72);
            doc.text(`Access Password: ${data.password}`, 20, 80);
            doc.text(`Login Via: ${data.metodeLogin}`, 20, 88);
            doc.text(`Rank Level: ${data.rank}`, 20, 96);
            doc.text(`Security Status: ${data.statusEmail}`, 20, 104);

            doc.setFont("helvetica", "bold");
            doc.text("2. INVENTORY & SPECIAL ITEMS", 20, 118);
            doc.line(20, 120, 190, 120);
            doc.setFont("helvetica", "normal");
            doc.text(`Lab Weapons: ${data.labGun}`, 20, 130);
            doc.text(`Rare Outfits: ${data.bundle}`, 20, 138);
            
            const detailSplit = doc.splitTextToSize(`Vehicles/Other: ${data.detailVault}`, 170);
            doc.text(detailSplit, 20, 146);

            // Images
            if (data.fotos && data.fotos.length > 0) {
                doc.addPage();
                doc.setFont("helvetica", "bold");
                doc.text(`EVIDENCE LOGS (${data.fotos.length} ATTACHMENTS)`, 20, 20);
                
                let currentY = 30;
                data.fotos.forEach((foto) => {
                    if (currentY + 80 > 280) { doc.addPage(); currentY = 20; }
                    try {
                        doc.addImage(foto, 'JPEG', 20, currentY, 130, 75);
                        currentY += 85;
                    } catch (e) { console.error(e); }
                });
            }

            doc.save(`PUBGM_INTEL_${data.pubgId}.pdf`);
        }

        function exportAllData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dbData));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "pubg_intel_backup.json");
            dl.click();
        }

        function hapusData(id) {
            if (confirm("DELETE THIS INTEL?")) {
                dbData = dbData.filter(d => d.id !== id);
                localStorage.setItem('pubg_admin_secure_data_v1', JSON.stringify(dbData));
                renderList();
            }
        }

        function hapusSemua() {
            if (confirm("WIPE ALL DATABASE? THIS ACTION IS PERMANENT.")) {
                dbData = [];
                localStorage.setItem('pubg_admin_secure_data_v1', JSON.stringify(dbData));
                renderList();
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
        renderList();
    </script>
</body>
</html>
