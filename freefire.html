<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Admin Jual/Lepas Akun Free Fire - Secure Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Tambahan Library untuk Kompresi Gambar agar LocalStorage tidak cepat penuh -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@600&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #fdf2f2;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(220, 38, 38, 0.1);
        }

        .ff-gradient {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
        }

        .gradient-border {
            border: 2px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, #ef4444, #f97316) border-box;
        }

        body.locked #mainContent {
            filter: blur(30px);
            pointer-events: none;
        }

        .security-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdf2f2;
        }

        .image-queue-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #fee2e2;
        }

        .image-queue-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-img-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body oncontextmenu="return false" class="select-none locked">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="security-overlay">
        <div class="glass-panel p-10 rounded-[3rem] shadow-2xl max-w-md w-full border-2 border-red-100 text-center">
            <div class="text-6xl mb-6">🔥</div>
            <h2 class="text-3xl font-black mb-2 text-slate-800 tracking-tight">FF Admin Login</h2>
            <p class="text-slate-500 mb-8 font-medium">Otorisasi diperlukan untuk akses database Free Fire.</p>
            
            <input type="password" id="officePassword" placeholder="Password Admin" class="w-full bg-slate-100 border-2 border-slate-200 rounded-2xl p-4 mb-4 text-center font-bold outline-none focus:border-red-500 transition-all">
            
            <button onclick="checkLogin()" class="w-full py-4 ff-gradient text-white font-black rounded-2xl hover:brightness-110 shadow-lg shadow-red-100 transition-all uppercase tracking-widest">Akses Database</button>
            <div id="loginError" class="mt-4 text-red-600 font-bold text-sm hidden"></div>
        </div>
    </div>

    <div id="mainContent" class="p-4 md:p-8 lg:p-12 transition-all duration-500 opacity-0">
        <header class="max-w-7xl mx-auto mb-10">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 glass-panel rounded-[2.5rem] p-8 flex flex-col justify-center border-l-8 border-red-600">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
                        <span class="text-xs font-black uppercase tracking-[0.2em] text-red-600">FF Secure Database</span>
                    </div>
                    <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight leading-none">
                        Survivor<br><span class="text-red-600">Admin Pro</span>
                    </h1>
                </div>

                <div class="lg:col-span-8 glass-panel rounded-[2.5rem] p-8 flex flex-col md:flex-row items-center justify-between gap-8 gradient-border">
                    <div class="text-center md:text-left">
                        <div id="realTimeClock" class="font-mono text-6xl font-bold text-slate-800 leading-none">00:00:00</div>
                        <div id="currentDate" class="text-sm font-bold text-slate-400 mt-2 uppercase tracking-widest">---</div>
                    </div>
                    <div class="flex flex-col items-center md:items-end">
                        <div id="statusBadge" class="px-4 py-2 rounded-full text-xs font-black uppercase tracking-wider mb-2 bg-red-100 text-red-600">● Live Secure</div>
                        <div class="text-xs font-bold text-slate-500">Kapasitas Penyimpanan: <span id="storageInfo">0 KB</span></div>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Kolom Form -->
            <div class="lg:col-span-5">
                <div class="glass-panel p-8 rounded-[2.5rem] shadow-xl overflow-y-auto max-h-[85vh]">
                    <h2 class="text-xl font-extrabold text-slate-800 mb-8 flex items-center gap-3">
                        <span class="p-2 bg-red-50 rounded-xl text-red-600">🔫</span>
                        Detail Akun Free Fire
                    </h2>
                    
                    <form id="ffAccountForm" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Jenis Transaksi</label>
                                <select id="tipe" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold text-slate-700 outline-none focus:border-red-500">
                                    <option value="Jual">🛒 Jual Akun</option>
                                    <option value="Lepas">💸 Lepas Akun</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Risiko Hackback</label>
                                <select id="risiko" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold text-slate-700 outline-none focus:border-red-500">
                                    <option value="Rendah">🟢 Sangat Aman</option>
                                    <option value="Sedang">🟡 Risiko Sedang</option>
                                    <option value="Tinggi">🔴 Risiko Tinggi</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Metode Login</label>
                                <select id="metodeLogin" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold text-slate-700 outline-none focus:border-red-500">
                                    <option value="Facebook">FB (Facebook)</option>
                                    <option value="Google">Google / Gmail</option>
                                    <option value="VK">VK Account</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Email / A2F</label>
                                <select id="statusEmail" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold text-slate-700 outline-none focus:border-red-500">
                                    <option value="Polos & A2F Off">⚪ Polos & A2F Off</option>
                                    <option value="Berisi & A2F On">📧 Berisi & A2F On</option>
                                    <option value="Polos & A2F On">🛡️ Polos & A2F On</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">FF Nickname/ID</label>
                                <input type="text" id="ffId" required placeholder="Nick / ID" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-semibold outline-none focus:border-red-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Password Login</label>
                                <input type="text" id="password" required placeholder="Password Login" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-semibold outline-none focus:border-red-500">
                            </div>
                        </div>

                        <div class="p-6 bg-red-50/50 rounded-[2rem] border border-red-100 space-y-4">
                            <h3 class="text-xs font-black text-red-600 uppercase tracking-widest flex items-center gap-2">
                                <span>⭐</span> Vault & Koleksi Langka
                            </h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Skin Evo Gun</label>
                                    <input type="text" id="evoGun" placeholder="Mis: AK Draco, MP40..." class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 font-semibold outline-none focus:border-red-500">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Bundle Utama</label>
                                    <input type="text" id="bundle" placeholder="Sakura, HipHop..." class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 font-semibold outline-none focus:border-red-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Detail Lainnya</label>
                                <textarea id="detailVault" placeholder="Sebutkan detail koleksi lainnya..." class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 font-semibold outline-none focus:border-red-500 h-20 resize-none"></textarea>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Bukti Screenshot (Otomatis Kompres)</label>
                            <label class="flex flex-col items-center w-full p-4 bg-white text-red-500 rounded-2xl border-2 border-dashed border-red-100 cursor-pointer hover:bg-red-50 transition">
                                <span class="text-sm font-bold" id="uploadLabel">Klik untuk Tambah Foto</span>
                                <input type='file' id="fotoInput" accept="image/*" class="hidden" multiple onchange="handleFileSelection(event)" />
                            </label>
                            <div id="imageQueue" class="flex flex-wrap gap-2 mt-4"></div>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full ff-gradient text-white font-black py-5 rounded-2xl shadow-lg shadow-red-200 transition-all uppercase tracking-widest text-sm flex justify-center items-center">
                            <span>Simpan ke Database FF</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Kolom List Data -->
            <div class="lg:col-span-7">
                <div class="glass-panel p-8 rounded-[2.5rem] shadow-xl min-h-[600px]">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-2xl font-black text-slate-800 tracking-tight">Data Survivor</h2>
                        <div class="flex gap-4">
                             <button onclick="exportAllData()" class="text-xs font-black text-blue-600 uppercase tracking-widest hover:underline transition">Backup JSON</button>
                             <button onclick="hapusSemua()" class="text-xs font-black text-red-400 uppercase tracking-widest hover:text-red-600 transition">Reset All</button>
                        </div>
                    </div>
                    
                    <div id="listData" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let dbData = JSON.parse(localStorage.getItem('ff_admin_secure_data_v1')) || [];
        const OFFICE_PASS = "kantoradmin"; 
        
        let currentPhotoQueue = [];

        // Fungsi Cek Login
        function checkLogin() {
            const input = document.getElementById('officePassword');
            if (input.value === OFFICE_PASS) {
                document.body.classList.remove('locked');
                document.getElementById('loginOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('mainContent').style.opacity = '1';
                }, 500);
            } else {
                const err = document.getElementById('loginError');
                err.innerText = "Akses Ditolak: Password Salah!";
                err.classList.remove('hidden');
            }
        }

        // Fungsi Kompres Gambar (Sangat Penting untuk menghemat LocalStorage)
        async function compressImage(file) {
            const options = {
                maxSizeMB: 0.2, // Maksimal 200KB per gambar
                maxWidthOrHeight: 1280,
                useWebWorker: true
            };
            try {
                return await imageCompression(file, options);
            } catch (error) {
                console.log(error);
                return file;
            }
        }

        async function handleFileSelection(event) {
            const files = event.target.files;
            const uploadLabel = document.getElementById('uploadLabel');
            uploadLabel.innerText = "Sedang Memproses Gambar...";
            
            for (let i = 0; i < files.length; i++) {
                // Kompres dulu sebelum diconvert ke Base64
                const compressedFile = await compressImage(files[i]);
                const base64 = await toBase64(compressedFile);
                currentPhotoQueue.push(base64);
            }
            
            renderImageQueue();
            uploadLabel.innerText = "Klik untuk Tambah Foto";
            event.target.value = '';
        }

        function removePhotoFromQueue(index) {
            currentPhotoQueue.splice(index, 1);
            renderImageQueue();
        }

        function renderImageQueue() {
            const container = document.getElementById('imageQueue');
            container.innerHTML = currentPhotoQueue.map((img, index) => `
                <div class="image-queue-item">
                    <img src="${img}" alt="Preview">
                    <div class="remove-img-btn" onclick="removePhotoFromQueue(${index})">×</div>
                </div>
            `).join('');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('realTimeClock').innerText = now.toTimeString().split(' ')[0];
            document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            // Info Storage
            const size = new Blob([JSON.stringify(dbData)]).size;
            document.getElementById('storageInfo').innerText = (size / 1024).toFixed(2) + " KB / 5000 KB";
        }

        document.getElementById('ffAccountForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            // Loading state
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span> Memproses...`;

            try {
                const item = {
                    id: Date.now(),
                    waktu: new Date().toLocaleString('id-ID'),
                    tipe: document.getElementById('tipe').value,
                    risiko: document.getElementById('risiko').value,
                    metodeLogin: document.getElementById('metodeLogin').value,
                    statusEmail: document.getElementById('statusEmail').value,
                    ffId: document.getElementById('ffId').value,
                    password: document.getElementById('password').value,
                    evoGun: document.getElementById('evoGun').value || "Tidak ada",
                    bundle: document.getElementById('bundle').value || "Biasa",
                    detailVault: document.getElementById('detailVault').value || "-",
                    fotos: [...currentPhotoQueue]
                };

                dbData.unshift(item);
                localStorage.setItem('ff_admin_secure_data_v1', JSON.stringify(dbData));
                
                renderList();
                e.target.reset();
                currentPhotoQueue = [];
                renderImageQueue();
            } catch (err) {
                alert("Gagal menyimpan: Kapasitas penyimpanan penuh! Hapus beberapa data lama.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        const toBase64 = file => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });

        function renderList() {
            const list = document.getElementById('listData');
            if (dbData.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-sm">Database Kosong</div>`;
                return;
            }

            list.innerHTML = dbData.map(item => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 hover:shadow-lg transition-all border-l-4 ${item.tipe === 'Jual' ? 'border-l-orange-500' : 'border-l-blue-500'}">
                    <div class="flex items-start gap-4 w-full md:w-auto">
                        <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl bg-slate-50">
                            ${item.tipe === 'Jual' ? '🛒' : '💸'}
                        </div>
                        <div class="overflow-hidden">
                            <div class="flex flex-wrap items-center gap-2 mb-1">
                                <h3 class="font-black text-slate-800 tracking-tight truncate max-w-[150px]">${item.ffId}</h3>
                                <span class="text-[8px] font-black uppercase px-2 py-0.5 rounded-full bg-red-100 text-red-600">${item.metodeLogin}</span>
                                <span class="text-[8px] font-black bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full">${item.statusEmail}</span>
                            </div>
                            <p class="text-[10px] font-bold text-slate-400 mb-1">Evo: ${item.evoGun} • Bundle: ${item.bundle} • (${item.fotos.length} Foto)</p>
                            <p class="text-[9px] font-bold text-slate-500 italic">${item.waktu}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 w-full md:w-auto">
                        <button onclick="downloadPDF(${item.id})" class="flex-1 md:flex-none px-6 py-3 bg-red-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:brightness-110 transition">REKAP PDF</button>
                        <button onclick="hapusData(${item.id})" class="p-3 text-slate-300 hover:text-red-500 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function downloadPDF(id) {
            const data = dbData.find(d => d.id === id);
            if (!data) return;
            const doc = new jsPDF();
            
            // Header
            doc.setFillColor(239, 68, 68);
            doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.setFont("helvetica", "bold");
            doc.text("FREE FIRE ACCOUNT - SECURITY REPORT", 20, 25);
            doc.setFontSize(10);
            doc.text(`Official Transaction ID: ${data.id}`, 20, 35);
            
            // Content
            doc.setTextColor(40, 40, 40);
            doc.setFontSize(14);
            doc.text("A. DETAIL LOGIN", 20, 60);
            doc.line(20, 62, 190, 62);
            
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.text(`Nick / ID: ${data.ffId}`, 20, 72);
            doc.text(`Password: ${data.password}`, 20, 80);
            doc.text(`Login Via: ${data.metodeLogin}`, 20, 88);
            doc.text(`Status Keamanan: ${data.statusEmail}`, 20, 96);
            doc.text(`Risiko HB: ${data.risiko}`, 20, 104);

            doc.setFont("helvetica", "bold");
            doc.text("B. SPESIFIKASI VAULT & KOLEKSI", 20, 118);
            doc.line(20, 120, 190, 120);
            doc.setFont("helvetica", "normal");
            doc.text(`Evo Gun: ${data.evoGun}`, 20, 130);
            doc.text(`Bundle Legend: ${data.bundle}`, 20, 138);
            
            const detailSplit = doc.splitTextToSize(`Detail Koleksi: ${data.detailVault}`, 170);
            doc.text(detailSplit, 20, 146);

            // Lampiran Foto
            if (data.fotos && data.fotos.length > 0) {
                doc.addPage();
                doc.setFont("helvetica", "bold");
                doc.text(`LAMPIRAN BUKTI (${data.fotos.length} SCREENSHOT)`, 20, 20);
                
                let currentY = 30;
                data.fotos.forEach((foto, idx) => {
                    if (currentY + 80 > 280) { doc.addPage(); currentY = 20; }
                    try {
                        // Memastikan format addImage benar (data:image/jpeg;base64,...)
                        doc.addImage(foto, 'JPEG', 20, currentY, 130, 75);
                        currentY += 85;
                    } catch (e) {
                        console.error("Gagal cetak foto di PDF", e);
                    }
                });
            }

            doc.save(`FF_REPORT_${data.ffId}.pdf`);
        }

        function exportAllData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dbData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "ff_admin_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function hapusData(id) {
            if (confirm("Hapus data ini?")) {
                dbData = dbData.filter(d => d.id !== id);
                localStorage.setItem('ff_admin_secure_data_v1', JSON.stringify(dbData));
                renderList();
            }
        }

        function hapusSemua() {
            if (confirm("Kosongkan semua database? Tindakan ini tidak bisa dibatalkan.")) {
                dbData = [];
                localStorage.setItem('ff_admin_secure_data_v1', JSON.stringify(dbData));
                renderList();
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
        renderList();
    </script>
</body>
</html>
