<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Admin MLBB - Land of Dawn Archives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #0a0e14; /* MLBB Deep Dark Blue */
            color: #e2e8f0;
            min-height: 100vh;
        }

        h1, h2, h3, button, .font-mlbb {
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .mlbb-panel {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(194, 150, 86, 0.2); /* Golden accent */
        }

        .mlbb-gradient {
            background: linear-gradient(135deg, #c29656 0%, #8e6a3a 100%); /* MLBB Gold */
            color: #000;
        }

        .mlbb-border-gold {
            border: 2px solid #c29656;
        }

        body.locked #mainContent {
            filter: blur(25px);
            pointer-events: none;
        }

        .security-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #06090e;
            background-image: radial-gradient(circle, rgba(194, 150, 86, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .image-queue-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #1e293b;
        }

        .remove-img-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        .spinner {
            border: 3px solid rgba(194, 150, 86, 0.1);
            border-radius: 50%;
            border-top: 3px solid #c29656;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #c29656; border-radius: 10px; }
        
        .mlbb-input {
            background: #1e293b;
            border: 1px solid #334155;
            transition: all 0.2s;
            color: white;
        }
        .mlbb-input:focus {
            border-color: #c29656;
            box-shadow: 0 0 0 2px rgba(194, 150, 86, 0.2);
        }
    </style>
</head>
<body oncontextmenu="return false" class="select-none locked">

    <!-- Login Overlay -->
    <div id="loginOverlay" class="security-overlay">
        <div class="mlbb-panel p-10 rounded-2xl shadow-2xl max-w-md w-full border-t-4 border-[#c29656] text-center">
            <div class="mb-6 flex justify-center">
                <div class="w-16 h-16 rounded-full bg-[#c29656] flex items-center justify-center shadow-[0_0_20px_rgba(194,150,86,0.5)]">
                    <span class="text-3xl">⚔️</span>
                </div>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-white tracking-tight">LAND OF DAWN ADMIN</h2>
            <p class="text-slate-400 mb-8 font-medium text-xs tracking-widest uppercase">Database Access Terminal</p>
            
            <input type="password" id="officePassword" placeholder="ACCESS PIN" class="w-full mlbb-input rounded-xl p-4 mb-4 text-center font-bold outline-none tracking-[1em]">
            
            <button onclick="checkLogin()" class="w-full py-4 mlbb-gradient font-bold rounded-xl hover:brightness-110 transition-all tracking-widest shadow-lg">ENTER ARCHIVES</button>
            <div id="loginError" class="mt-4 text-red-500 font-bold text-[10px] uppercase hidden">Access Denied: Invalid Pin</div>
        </div>
    </div>

    <div id="mainContent" class="p-4 md:p-8 transition-all duration-500 opacity-0">
        <header class="max-w-7xl mx-auto mb-10">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 mlbb-panel rounded-2xl p-8 flex flex-col justify-center border-l-8 border-[#c29656]">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-green-500">MLBB Server Online</span>
                    </div>
                    <h1 class="text-3xl font-black text-white tracking-tight leading-none">
                        ACCOUNT<br><span class="text-[#c29656]">DASHBOARD V3</span>
                    </h1>
                </div>

                <div class="lg:col-span-8 mlbb-panel rounded-2xl p-8 flex flex-col md:flex-row items-center justify-between gap-8">
                    <div class="text-center md:text-left">
                        <div id="realTimeClock" class="text-5xl font-bold text-white leading-none">00:00:00</div>
                        <div id="currentDate" class="text-[10px] font-bold text-slate-500 mt-2 uppercase tracking-[0.2em]">---</div>
                    </div>
                    <div class="flex flex-col items-center md:items-end">
                        <div id="statusBadge" class="px-3 py-1 bg-blue-500/10 border border-blue-500 text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-2">AUTH: ENCRYPTED</div>
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Storage: <span id="storageInfo" class="text-white">0 KB</span></div>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Input Akun -->
            <div class="lg:col-span-5">
                <div class="mlbb-panel p-8 rounded-2xl shadow-xl overflow-y-auto max-h-[85vh]">
                    <h2 class="text-sm font-bold text-[#c29656] mb-8 flex items-center gap-3 tracking-[0.2em]">
                        <span class="w-6 h-0.5 bg-[#c29656]"></span> DATA ENTRY
                    </h2>
                    
                    <form id="mlbbAccountForm" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Category</label>
                                <select id="tipe" class="w-full mlbb-input rounded-lg p-3 font-bold outline-none">
                                    <option value="Jual">JUAL</option>
                                    <option value="Tukar">TRADE / BARTER</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Highest Rank</label>
                                <select id="rank" class="w-full mlbb-input rounded-lg p-3 font-bold outline-none">
                                    <option value="Mythical Immortal">✨ MYTHICAL IMMORTAL</option>
                                    <option value="Mythical Glory">🔥 MYTHICAL GLORY</option>
                                    <option value="Mythic">🛡️ MYTHIC</option>
                                    <option value="Legend">⭐ LEGEND</option>
                                    <option value="Epic">💎 EPIC</option>
                                    <option value="Below">🥉 GRANDMASTER/BELOW</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Platform</label>
                                <select id="loginVia" class="w-full mlbb-input rounded-lg p-3 font-bold outline-none">
                                    <option value="Moonton">Moonton ID</option>
                                    <option value="TikTok">TikTok Connect</option>
                                    <option value="Google Play">Google Play</option>
                                    <option value="FB">Facebook</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Verification</label>
                                <select id="statusEmail" class="w-full mlbb-input rounded-lg p-3 font-bold outline-none">
                                    <option value="All Unbind">✅ ALL UNBIND (SAFE)</option>
                                    <option value="Partial">⚠️ PARTIAL BIND</option>
                                    <option value="Contact Admin">📞 CONTACT ADMIN</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Account Nickname</label>
                                <input type="text" id="nickname" required placeholder="Ex: LancelotGG" class="w-full mlbb-input rounded-lg p-3 font-semibold outline-none">
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Password / Login</label>
                                <input type="text" id="password" required placeholder="SecretPass" class="w-full mlbb-input rounded-lg p-3 font-semibold outline-none">
                            </div>
                        </div>

                        <!-- Collection Details -->
                        <div class="p-6 bg-slate-800/50 rounded-xl border border-slate-700/50 space-y-4">
                            <h3 class="text-[9px] font-bold text-[#c29656] uppercase tracking-widest flex items-center gap-2">
                                INVENTORY & ASSETS
                            </h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Hero Count</label>
                                    <input type="number" id="heroCount" placeholder="125" class="w-full mlbb-input rounded-lg p-3 font-semibold outline-none">
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Skin Count</label>
                                    <input type="number" id="skinCount" placeholder="300" class="w-full mlbb-input rounded-lg p-3 font-semibold outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Rare Skins (Collector, Legend, Collab)</label>
                                <input type="text" id="rareSkins" placeholder="Collector Gusion, KOF Chou..." class="w-full mlbb-input rounded-lg p-3 font-semibold outline-none">
                            </div>
                            <div>
                                <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Additional Notes</label>
                                <textarea id="notes" placeholder="Winrate 60%, Emblem Max, 500 Diamonds..." class="w-full mlbb-input rounded-lg p-3 font-semibold outline-none h-20 resize-none"></textarea>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Account Evidence (Screenshots)</label>
                            <label class="flex flex-col items-center w-full p-4 bg-slate-800 text-[#c29656] rounded-xl border-2 border-dashed border-slate-700 cursor-pointer hover:bg-slate-700 transition">
                                <span class="text-[10px] font-bold tracking-widest" id="uploadLabel">UPLOAD IMAGES</span>
                                <input type='file' id="fotoInput" accept="image/*" class="hidden" multiple onchange="handleFileSelection(event)" />
                            </label>
                            <div id="imageQueue" class="flex flex-wrap gap-2 mt-4"></div>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full mlbb-gradient font-bold py-5 rounded-xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-widest text-xs flex justify-center items-center">
                            <span>SAVE TO DATABASE</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- List Data Akun -->
            <div class="lg:col-span-7">
                <div class="mlbb-panel p-8 rounded-2xl shadow-xl min-h-[600px]">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-xl font-bold text-white tracking-tight uppercase">ARCHIVED ACCOUNTS</h2>
                        <div class="flex gap-4">
                             <button onclick="exportAllData()" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest hover:text-[#c29656] transition">Backup</button>
                             <button onclick="hapusSemua()" class="text-[10px] font-bold text-red-500 uppercase tracking-widest hover:underline transition">Wipe</button>
                        </div>
                    </div>
                    
                    <div id="listData" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let dbData = JSON.parse(localStorage.getItem('mlbb_admin_secure_data_v1')) || [];
        const OFFICE_PASS = "kantoradmin"; 
        
        let currentPhotoQueue = [];

        function checkLogin() {
            const input = document.getElementById('officePassword');
            if (input.value === OFFICE_PASS) {
                document.body.classList.remove('locked');
                document.getElementById('loginOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('mainContent').style.opacity = '1';
                }, 500);
            } else {
                const err = document.getElementById('loginError');
                err.classList.remove('hidden');
            }
        }

        async function compressImage(file) {
            const options = {
                maxSizeMB: 0.15,
                maxWidthOrHeight: 1280,
                useWebWorker: true
            };
            try {
                return await imageCompression(file, options);
            } catch (error) {
                console.error(error);
                return file;
            }
        }

        async function handleFileSelection(event) {
            const files = event.target.files;
            const uploadLabel = document.getElementById('uploadLabel');
            uploadLabel.innerText = "PROCESSING...";
            
            for (let i = 0; i < files.length; i++) {
                const compressedFile = await compressImage(files[i]);
                const base64 = await toBase64(compressedFile);
                currentPhotoQueue.push(base64);
            }
            
            renderImageQueue();
            uploadLabel.innerText = "UPLOAD IMAGES";
            event.target.value = '';
        }

        function removePhotoFromQueue(index) {
            currentPhotoQueue.splice(index, 1);
            renderImageQueue();
        }

        function renderImageQueue() {
            const container = document.getElementById('imageQueue');
            container.innerHTML = currentPhotoQueue.map((img, index) => `
                <div class="image-queue-item">
                    <img src="${img}" alt="Preview" class="w-full h-full object-cover">
                    <div class="remove-img-btn" onclick="removePhotoFromQueue(${index})">×</div>
                </div>
            `).join('');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('realTimeClock').innerText = now.toTimeString().split(' ')[0];
            document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            const size = new Blob([JSON.stringify(dbData)]).size;
            document.getElementById('storageInfo').innerText = (size / 1024).toFixed(1) + " KB";
        }

        document.getElementById('mlbbAccountForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span> UPLOADING...`;

            try {
                const item = {
                    id: Date.now(),
                    waktu: new Date().toLocaleString('id-ID'),
                    tipe: document.getElementById('tipe').value,
                    rank: document.getElementById('rank').value,
                    loginVia: document.getElementById('loginVia').value,
                    statusEmail: document.getElementById('statusEmail').value,
                    nickname: document.getElementById('nickname').value,
                    password: document.getElementById('password').value,
                    heroCount: document.getElementById('heroCount').value || 0,
                    skinCount: document.getElementById('skinCount').value || 0,
                    rareSkins: document.getElementById('rareSkins').value || "-",
                    notes: document.getElementById('notes').value || "-",
                    fotos: [...currentPhotoQueue]
                };

                dbData.unshift(item);
                localStorage.setItem('mlbb_admin_secure_data_v1', JSON.stringify(dbData));
                
                renderList();
                e.target.reset();
                currentPhotoQueue = [];
                renderImageQueue();
            } catch (err) {
                alert("Storage limit! Clear some data.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        const toBase64 = file => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });

        function renderList() {
            const list = document.getElementById('listData');
            if (dbData.length === 0) {
                list.innerHTML = `<div class="text-center py-24 text-slate-700 font-bold uppercase tracking-widest text-xs">NO ACCOUNTS ARCHIVED</div>`;
                return;
            }

            list.innerHTML = dbData.map(item => `
                <div class="bg-slate-800/40 p-6 rounded-xl border border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4 hover:border-[#c29656]/50 transition-all">
                    <div class="flex items-start gap-4 w-full md:w-auto">
                        <div class="w-12 h-12 flex items-center justify-center text-xl bg-slate-900 rounded-lg border border-slate-800">
                            ${item.tipe === 'Jual' ? '💰' : '♻️'}
                        </div>
                        <div class="overflow-hidden">
                            <div class="flex flex-wrap items-center gap-2 mb-1">
                                <h3 class="font-bold text-white tracking-tight truncate max-w-[150px] uppercase">${item.nickname}</h3>
                                <span class="text-[8px] font-bold uppercase px-2 py-0.5 border border-[#c29656] text-[#c29656] rounded">${item.rank}</span>
                                <span class="text-[8px] font-bold bg-slate-700 text-slate-300 px-2 py-0.5 rounded">${item.loginVia}</span>
                            </div>
                            <p class="text-[9px] font-bold text-slate-500 mb-1">HEROES: ${item.heroCount} • SKINS: ${item.skinCount}</p>
                            <p class="text-[8px] font-bold text-slate-600 italic">${item.waktu}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 w-full md:w-auto">
                        <button onclick="downloadPDF(${item.id})" class="flex-1 md:flex-none px-6 py-3 mlbb-gradient font-bold text-[9px] uppercase tracking-widest rounded-lg hover:brightness-110 transition">GENERATE PDF</button>
                        <button onclick="hapusData(${item.id})" class="p-3 text-slate-600 hover:text-red-500 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function downloadPDF(id) {
            const data = dbData.find(d => d.id === id);
            if (!data) return;
            const doc = new jsPDF();
            
            // Header
            doc.setFillColor(10, 14, 20);
            doc.rect(0, 0, 210, 45, 'F');
            doc.setFillColor(194, 150, 86);
            doc.rect(0, 43, 210, 2, 'F');

            doc.setTextColor(194, 150, 86);
            doc.setFontSize(24);
            doc.setFont("helvetica", "bold");
            doc.text("MLBB ACCOUNT RECORD", 20, 25);
            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);
            doc.text(`UID_RECORD: ${data.id} | TIMESTAMP: ${data.waktu}`, 20, 35);
            
            // Details
            doc.setTextColor(30, 30, 30);
            doc.setFontSize(12);
            doc.setFont("helvetica", "bold");
            doc.text("A. ACCOUNT ACCESS", 20, 60);
            doc.setDrawColor(194, 150, 86);
            doc.line(20, 62, 190, 62);
            
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text(`Nickname: ${data.nickname}`, 25, 72);
            doc.text(`Password: ${data.password}`, 25, 80);
            doc.text(`Login Via: ${data.loginVia}`, 25, 88);
            doc.text(`Rank: ${data.rank}`, 25, 96);
            doc.text(`Security: ${data.statusEmail}`, 25, 104);

            doc.setFont("helvetica", "bold");
            doc.text("B. INVENTORY SUMMARY", 20, 120);
            doc.line(20, 122, 190, 122);
            doc.setFont("helvetica", "normal");
            doc.text(`Total Heroes: ${data.heroCount}`, 25, 132);
            doc.text(`Total Skins: ${data.skinCount}`, 25, 140);
            doc.text(`Rare Items: ${data.rareSkins}`, 25, 148);
            
            const notesSplit = doc.splitTextToSize(`Admin Notes: ${data.notes}`, 160);
            doc.text(notesSplit, 25, 156);

            // Images
            if (data.fotos && data.fotos.length > 0) {
                doc.addPage();
                doc.setFillColor(10, 14, 20);
                doc.rect(0, 0, 210, 20, 'F');
                doc.setTextColor(194, 150, 86);
                doc.text(`VISUAL DATA EVIDENCE`, 20, 13);
                
                let currentY = 30;
                data.fotos.forEach((foto) => {
                    if (currentY + 80 > 280) { doc.addPage(); currentY = 30; }
                    try {
                        doc.addImage(foto, 'JPEG', 25, currentY, 120, 70);
                        currentY += 80;
                    } catch (e) {}
                });
            }

            doc.save(`MLBB_ACC_${data.nickname}.pdf`);
        }

        function exportAllData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dbData));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "mlbb_database_backup.json");
            dl.click();
        }

        function hapusData(id) {
            if (confirm("Hapus record ini?")) {
                dbData = dbData.filter(d => d.id !== id);
                localStorage.setItem('mlbb_admin_secure_data_v1', JSON.stringify(dbData));
                renderList();
            }
        }

        function hapusSemua() {
            if (confirm("WIPE SEMUA DATA? Tindakan ini tidak bisa dibatalkan.")) {
                dbData = [];
                localStorage.setItem('mlbb_admin_secure_data_v1', JSON.stringify(dbData));
                renderList();
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
        renderList();
    </script>
</body>
</html>
